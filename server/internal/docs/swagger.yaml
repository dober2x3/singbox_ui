basePath: /api
definitions:
  certificate.CertificateInfo:
    description: Certificate metadata including validity period and fingerprint
    properties:
      cert_path:
        example: /data/singbox/cert.pem
        type: string
      common_name:
        example: example.com
        type: string
      fingerprint:
        example: SHA256:abc123def456
        type: string
      key_path:
        example: /data/singbox/key.pem
        type: string
      valid_from:
        example: "2026-06-01T00:00:00Z"
        type: string
      valid_to:
        example: "2027-06-01T00:00:00Z"
        type: string
    type: object
  certificate.CheckTLS13Request:
    description: Request to check if a server supports TLS 1.3 (required for Reality
      disguise domain)
    properties:
      port:
        example: 443
        type: integer
      server:
        example: example.com
        type: string
    required:
    - server
    type: object
  certificate.CheckTLS13Response:
    description: Result of TLS 1.3 support check
    properties:
      error:
        example: connection failed
        type: string
      supported:
        example: true
        type: boolean
      tls_version:
        example: TLS 1.3
        type: string
    type: object
  certificate.DerivePublicKeyRequest:
    description: Request to derive a public key from a private key
    properties:
      private_key:
        example: ARVXKXp6V9XmXQmQmQmQmQmQmQmQmQmQmQmQmQmQmQmQmQ
        type: string
    required:
    - private_key
    type: object
  certificate.GenerateCertRequest:
    description: Request to generate a self-signed TLS certificate
    properties:
      domain:
        example: example.com
        type: string
      valid_days:
        example: 365
        type: integer
    required:
    - domain
    - valid_days
    type: object
  certificate.RealityKeypairResponse:
    description: x25519 key pair for Reality TLS
    properties:
      private_key:
        example: ARVXKXp6V9XmXQmQmQmQmQmQmQmQmQmQmQmQmQmQmQmQmQ
        type: string
      public_key:
        example: 9XmXQmQmQmQmQmQmQmQmQmQmQmQmQmQmQmQmQmQmQmQmQ
        type: string
    type: object
  docs.ErrorResponse:
    properties:
      error:
        example: internal server error
        type: string
      message:
        example: detailed error description
        type: string
    type: object
  speedtest.SpeedTestState:
    properties:
      download_speed:
        example: 15.5
        type: number
      error:
        example: timeout
        type: string
      latency_ms:
        example: 120
        type: integer
      progress:
        example: 50
        type: integer
      running:
        example: true
        type: boolean
      status:
        example: testing...
        type: string
      tag:
        example: my-proxy
        type: string
    type: object
  warp.LicenseBindRequest:
    properties:
      license:
        example: xxxx-xxxx-xxxx-xxxx
        type: string
    type: object
  warp.WarpAccount:
    properties:
      account_type:
        example: free
        type: string
      id:
        example: abcd-1234-ef56-7890
        type: string
      license:
        example: xxxx-xxxx-xxxx-xxxx
        type: string
      premium_data:
        example: 0
        type: integer
      warp_plus:
        example: false
        type: boolean
    type: object
  warp.WarpConfig:
    properties:
      client_id:
        example: abc123
        type: string
      interface:
        $ref: '#/definitions/warp.WarpInterface'
      peers:
        items:
          $ref: '#/definitions/warp.WarpPeer'
        type: array
    type: object
  warp.WarpDevice:
    properties:
      account:
        $ref: '#/definitions/warp.WarpAccount'
      config:
        $ref: '#/definitions/warp.WarpConfig'
      id:
        example: abcd-1234-ef56-7890
        type: string
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  warp.WarpEndpointResult:
    properties:
      host:
        example: 162.159.192.1
        type: string
      latency_ms:
        example: 42
        type: integer
      loss_pct:
        example: 0
        type: integer
      port:
        example: 2408
        type: integer
      reachable:
        example: true
        type: boolean
    type: object
  warp.WarpInterface:
    properties:
      addresses:
        $ref: '#/definitions/warp.WarpInterfaceAddr'
    type: object
  warp.WarpInterfaceAddr:
    properties:
      v4:
        example: 172.16.0.2
        type: string
      v6:
        example: fd01:5ca1:ab1e:0000:0000:0000:0000:0002
        type: string
    type: object
  warp.WarpPeer:
    properties:
      endpoint:
        $ref: '#/definitions/warp.WarpPeerEndpoint'
      public_key:
        example: bmXOC+F1FxEMF9dyiK2H5/1SUtzH0cVo9NFiY5pA0Is=
        type: string
    type: object
  warp.WarpPeerEndpoint:
    properties:
      host:
        example: engage.cloudflareclient.com
        type: string
      v4:
        example: 162.159.192.1
        type: string
      v6:
        example: 2606:4700:100::1
        type: string
    type: object
  warp.WarpRecord:
    properties:
      created_at:
        example: "2026-06-01T00:00:00Z"
        type: string
      device:
        $ref: '#/definitions/warp.WarpDevice'
      private_key:
        example: gL7fV/1GkH+3...
        type: string
      public_key:
        example: xTIBdMd5Fq+3...
        type: string
      updated_at:
        example: "2026-06-01T00:00:00Z"
        type: string
    type: object
  warp.WarpRegisterResponse:
    properties:
      account:
        $ref: '#/definitions/warp.WarpAccount'
      config:
        $ref: '#/definitions/warp.WarpConfig'
      id:
        example: abcd-1234-ef56-7890
        type: string
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  warp.WarpScanConfig:
    properties:
      concurrency:
        example: 10
        type: integer
      max_candidates:
        example: 10
        type: integer
      ping_times:
        example: 3
        type: integer
      sample_per_range:
        example: 3
        type: integer
      timeout_ms:
        example: 5000
        type: integer
      top_n:
        example: 5
        type: integer
    type: object
  wireguard.ClientConfigFile:
    description: Saved WireGuard client config file
    properties:
      content:
        example: |-
          [Interface]
          PrivateKey = ...
        type: string
      name:
        example: client-0.conf
        type: string
    type: object
  wireguard.DerivePublicKeyRequest:
    description: Request to derive a WireGuard public key from a private key
    properties:
      private_key:
        example: gL7fV/1GkH+3...
        type: string
    required:
    - private_key
    type: object
  wireguard.MessageResponse:
    description: Generic message response
    properties:
      message:
        example: operation completed
        type: string
    type: object
  wireguard.PublicIPResponse:
    description: Response containing the server's public IP address
    properties:
      ip:
        example: 203.0.113.1
        type: string
    type: object
  wireguard.SaveClientFileRequest:
    description: Request to save a WireGuard client .conf file
    properties:
      client_index:
        example: 0
        type: integer
      content:
        example: |-
          [Interface]
          PrivateKey = ...
        type: string
    type: object
  wireguard.WireGuardKeyPair:
    description: WireGuard key pair with private and public keys
    properties:
      privateKey:
        example: gL7fV/1GkH+3...
        type: string
      publicKey:
        example: xTIBdMd5Fq+3...
        type: string
    type: object
  wireguard.WireGuardKeyRequest:
    description: Request to generate or retrieve cached WireGuard keys
    properties:
      ip:
        example: 10.0.0.1
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for managing sing-box, WireGuard, subscriptions, probing, and WARP
  title: Singbox UI API
  version: "1.0"
paths:
  /singbox/certificate:
    get:
      description: Returns metadata about the stored TLS certificate including validity
        and fingerprint
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/certificate.CertificateInfo'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Get certificate info
      tags:
      - certificate
    post:
      consumes:
      - application/json
      description: Generates a self-signed TLS certificate for the given domain and
        validity period, saves it to the singbox directory
      parameters:
      - description: Domain and validity period
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/certificate.GenerateCertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/certificate.CertificateInfo'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Generate self-signed certificate
      tags:
      - certificate
  /singbox/certificate/upload:
    post:
      consumes:
      - multipart/form-data
      description: Uploads cert.pem and key.pem files as multipart form data
      parameters:
      - description: Certificate file (cert.pem)
        in: formData
        name: cert
        required: true
        type: file
      - description: Private key file (key.pem)
        in: formData
        name: key
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/certificate.CertificateInfo'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Upload certificate files
      tags:
      - certificate
  /singbox/reality/check-tls:
    post:
      consumes:
      - application/json
      description: Checks if a remote server supports TLS 1.3 (required for Reality
        disguise domain)
      parameters:
      - description: Server domain and port
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/certificate.CheckTLS13Request'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/certificate.CheckTLS13Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Check TLS 1.3 support
      tags:
      - reality
  /singbox/reality/keypair:
    post:
      description: Generates a random x25519 key pair for use with Reality TLS
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/certificate.RealityKeypairResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Generate Reality key pair
      tags:
      - reality
  /singbox/reality/public-key:
    post:
      consumes:
      - application/json
      description: Derives the public key from a base64-encoded x25519 private key
      parameters:
      - description: Private key
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/certificate.DerivePublicKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/certificate.RealityKeypairResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Derive Reality public key
      tags:
      - reality
  /speedtest/start:
    post:
      description: Starts a speed test for all loaded proxy nodes
      produces:
      - application/json
      responses:
        "200":
          description: speed test started
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Start speed test
      tags:
      - speedtest
  /speedtest/status:
    get:
      description: Returns the current speed test state including progress and results
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/speedtest.SpeedTestState'
      summary: Get speed test status
      tags:
      - speedtest
  /speedtest/stop:
    post:
      description: Stops the currently running speed test if one is in progress
      produces:
      - application/json
      responses:
        "200":
          description: stop requested
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Stop speed test
      tags:
      - speedtest
  /warp/account:
    delete:
      description: Deletes the stored WARP device account
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Delete WARP account
      tags:
      - warp
    get:
      description: Returns the stored WARP device account info
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/warp.WarpRecord'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Get WARP account
      tags:
      - warp
  /warp/license:
    post:
      consumes:
      - application/json
      description: Binds a WARP+ license key to the registered device
      parameters:
      - description: License key
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/warp.LicenseBindRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/warp.WarpRecord'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Bind WARP+ license
      tags:
      - warp
  /warp/register:
    post:
      description: Registers a new WARP device with Cloudflare
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/warp.WarpRegisterResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Register WARP device
      tags:
      - warp
  /warp/scan:
    post:
      consumes:
      - application/json
      description: Scans for available WARP endpoints with best latency
      parameters:
      - description: Scan configuration (uses defaults if omitted)
        in: body
        name: config
        schema:
          $ref: '#/definitions/warp.WarpScanConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/warp.WarpEndpointResult'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Scan WARP endpoints
      tags:
      - warp
  /wireguard/client-config:
    get:
      description: Returns the saved WireGuard client configuration as raw JSON
      produces:
      - application/json
      responses:
        "200":
          description: client config JSON
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Get client config
      tags:
      - wireguard
    post:
      consumes:
      - application/json
      description: Saves raw JSON as the WireGuard client configuration
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wireguard.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Save client config
      tags:
      - wireguard
  /wireguard/client-files:
    get:
      description: Returns a list of all saved WireGuard .conf files
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/wireguard.ClientConfigFile'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: List client config files
      tags:
      - wireguard
  /wireguard/keygen:
    post:
      consumes:
      - application/json
      description: Generates or retrieves cached WireGuard key pair. Optionally associates
        with an IP address
      parameters:
      - description: Optional IP address
        in: body
        name: request
        schema:
          $ref: '#/definitions/wireguard.WireGuardKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wireguard.WireGuardKeyPair'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Generate WireGuard keys
      tags:
      - wireguard
  /wireguard/keys-cache:
    get:
      description: Returns all cached WireGuard key entries with their associated
        IPs
      produces:
      - application/json
      responses:
        "200":
          description: keyed by IP
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Get keys cache
      tags:
      - wireguard
  /wireguard/pubkey:
    post:
      consumes:
      - application/json
      description: Derives a WireGuard public key from a base64-encoded private key
      parameters:
      - description: Private key
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wireguard.DerivePublicKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: public key
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Derive public key
      tags:
      - wireguard
  /wireguard/public-ip:
    get:
      description: Returns the server's detected public IPv4 address
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wireguard.PublicIPResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Get public IP
      tags:
      - wireguard
  /wireguard/save-client-file:
    post:
      consumes:
      - application/json
      description: Saves a .conf file content for a specific client. Accepts JSON
        body or multipart form
      parameters:
      - description: Client file info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/wireguard.SaveClientFileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/wireguard.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/docs.ErrorResponse'
      summary: Save client config file
      tags:
      - wireguard
schemes:
- http
swagger: "2.0"
tags:
- description: Subscription management
  name: subscription
- description: sing-box container lifecycle and config management
  name: singbox
- description: WireGuard key generation and client configuration
  name: wireguard
- description: Self-signed certificate management
  name: certificate
- description: REALITY keypair generation and TLS checks
  name: reality
- description: Node health probing and latency measurement
  name: prober
- description: Proxy speed testing
  name: speedtest
- description: WARP registration, licensing, and endpoint scanning
  name: warp
- description: System health and status endpoints
  name: system
