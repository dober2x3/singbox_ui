services:
  singbox-ui:
    build: .
    container_name: singbox-ui
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/home/data
      - ./config.yaml:/home/data/config.yaml
    environment:
      - DATA_DIR=/home/data
      - TZ=Asia/Shanghai
    # The config.yaml file is loaded automatically from DATA_DIR/config.yaml.
    # See config.example.yaml for all available options.
